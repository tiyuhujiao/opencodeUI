name: Feature request
description: Suggest an improvement for opencode-ui.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like to see.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Extension host
        - Webview UI
        - opencode CLI/serve bridge
        - Session/history
        - Models/providers/agents
        - Packaging/release
        - Documentation
        - Other
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional context, screenshots, or examples.
