name: Bug report
description: Report a reproducible problem in opencode-ui.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please avoid sharing secrets, API keys, private prompts, or full session exports.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: The sidebar fails to...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that reproduces the issue.
      placeholder: |
        1. Open...
        2. Select...
        3. Send...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: host
    attributes:
      label: Host environment
      options:
        - Windows local
        - Linux local
        - Remote-WSL
        - Remote-SSH Linux
        - Generic Linux remote
        - Other
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Include opencode-ui, opencode, IDE, Node, and npm versions when available.
      placeholder: opencode-ui 0.0.74, opencode 1.15.10, VS Code 1.105.0, Node 20.x, npm 10.x
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste sanitized diagnostics or console output.
      render: text
