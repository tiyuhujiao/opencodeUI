name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            webview-ui/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install webview dependencies
        run: npm --prefix webview-ui ci

      - name: Check
        run: npm run check

      - name: Package VSIX
        run: npm run package

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: opencode-ui-vsix
          path: vsix/*.vsix
          if-no-files-found: error
