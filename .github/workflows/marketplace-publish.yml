name: Publish Marketplace

on:
  workflow_dispatch:
    inputs:
      version:
        description: Marketplace version to publish. Defaults to github-upload/release.json.
        required: false
        type: string
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: marketplace-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            webview-ui/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install webview dependencies
        run: npm --prefix webview-ui ci

      - name: Check
        run: npm run check

      - name: Resolve Marketplace version
        id: marketplace_version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          marketplace_version="$(
            node <<'NODE'
          const fs = require("node:fs");

          const release = JSON.parse(
            fs.readFileSync("github-upload/release.json", "utf8"),
          );
          const raw =
            process.env.RELEASE_TAG ||
            process.env.INPUT_VERSION ||
            release.publicVersion;
          const version = raw.replace(/^v/i, "");

          if (!/^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$/.test(version)) {
            throw new Error(
              `Marketplace version must be semver, got ${JSON.stringify(raw)}.`,
            );
          }

          console.log(version);
          NODE
          )"

          echo "version=$marketplace_version" >> "$GITHUB_OUTPUT"
          echo "Marketplace version: $marketplace_version"

      - name: Build Marketplace VSIX
        run: npm run package:github
        env:
          OPENCODEUI_PUBLIC_VERSION: ${{ steps.marketplace_version.outputs.version }}

      - name: Resolve Marketplace VSIX
        id: package
        shell: bash
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require("node:fs");
          const path = require("node:path");

          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const publicVersion = process.env.OPENCODEUI_PUBLIC_VERSION;
          const vsixPath = path.join(
            "github-upload",
            "vsix",
            `${pkg.name}-${publicVersion}.vsix`,
          );

          if (!fs.existsSync(vsixPath)) {
            throw new Error(`Missing Marketplace VSIX: ${vsixPath}`);
          }

          console.log(`vsix=${vsixPath.replaceAll("\\", "/")}`);
          console.log(`extension_id=${pkg.publisher}.${pkg.name}`);
          console.log(`version=${publicVersion}`);
          NODE
        env:
          OPENCODEUI_PUBLIC_VERSION: ${{ steps.marketplace_version.outputs.version }}

      - name: Upload Marketplace VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-vsix
          path: ${{ steps.package.outputs.vsix }}
          if-no-files-found: error

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Resolve Marketplace identity
        id: marketplace_identity
        shell: bash
        run: |
          profile_json="$(
            az rest \
              --method get \
              --url "https://app.vssps.visualstudio.com/_apis/profile/profiles/me" \
              --resource "499b84ac-1321-427f-aa17-267ca6975798"
          )"
          marketplace_user_id="$(
            node -e '
              let input = "";
              process.stdin.on("data", (chunk) => { input += chunk; });
              process.stdin.on("end", () => {
                const profile = JSON.parse(input);
                if (!profile.id) {
                  throw new Error("Marketplace profile response did not include an id.");
                }
                console.log(profile.id);
              });
            ' <<< "$profile_json"
          )"

          echo "marketplace_user_id=$marketplace_user_id" >> "$GITHUB_OUTPUT"
          echo "Marketplace User Id: $marketplace_user_id"

      - name: Publish to VS Code Marketplace
        shell: bash
        run: |
          npx vsce publish \
            --azure-credential \
            --packagePath "${{ steps.package.outputs.vsix }}" \
            --skip-duplicate
