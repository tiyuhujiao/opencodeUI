name: Publish Marketplace

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            webview-ui/package-lock.json

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Marketplace identity
        id: marketplace_identity
        shell: bash
        run: |
          profile_json="$(
            az rest \
              --method get \
              --url "https://app.vssps.visualstudio.com/_apis/profile/profiles/me" \
              --resource "499b84ac-1321-427f-aa17-267ca6975798"
          )"
          marketplace_user_id="$(
            node -e '
              let input = "";
              process.stdin.on("data", (chunk) => { input += chunk; });
              process.stdin.on("end", () => {
                const profile = JSON.parse(input);
                if (!profile.id) {
                  throw new Error("Marketplace profile response did not include an id.");
                }
                console.log(profile.id);
              });
            ' <<< "$profile_json"
          )"

          echo "marketplace_user_id=$marketplace_user_id" >> "$GITHUB_OUTPUT"
          {
            echo "### Marketplace managed identity"
            echo
            echo "Add this Marketplace User Id to the Visual Studio Marketplace publisher as a Contributor:"
            echo
            echo "\`$marketplace_user_id\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install root dependencies
        run: npm ci

      - name: Install webview dependencies
        run: npm --prefix webview-ui ci

      - name: Check
        run: npm run check

      - name: Build Marketplace VSIX
        run: npm run package:github

      - name: Resolve Marketplace VSIX
        id: package
        shell: bash
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require("node:fs");
          const path = require("node:path");

          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const release = JSON.parse(
            fs.readFileSync(path.join("github-upload", "release.json"), "utf8"),
          );
          const vsixPath = path.join(
            "github-upload",
            "vsix",
            `${pkg.name}-${release.publicVersion}.vsix`,
          );

          if (!fs.existsSync(vsixPath)) {
            throw new Error(`Missing Marketplace VSIX: ${vsixPath}`);
          }

          console.log(`vsix=${vsixPath.replaceAll("\\", "/")}`);
          console.log(`extension_id=${pkg.publisher}.${pkg.name}`);
          console.log(`version=${release.publicVersion}`);
          NODE

      - name: Upload Marketplace VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-vsix
          path: ${{ steps.package.outputs.vsix }}
          if-no-files-found: error

      - name: Publish to VS Code Marketplace
        shell: bash
        run: |
          npx vsce publish \
            --azure-credential \
            --packagePath "${{ steps.package.outputs.vsix }}" \
            --skip-duplicate
